<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            max-width: 300px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .control-group input[type="range"],
        .control-group input[type="color"],
        .control-group input[type="number"] {
            width: 100%;
        }

        .control-group input[type="range"] {
            margin-bottom: 5px;
        }

        .value-display {
            font-size: 12px;
            color: #666;
        }
    </style>
</head>

<body>
    <div id="canvas-container"></div>
    <div id="controls">
        <h3>Управление сценой</h3>

        <div class="control-group">
            <label>Интенсивность направленного света</label>
            <input type="range" id="dirLightIntensity" min="0" max="5" step="0.1" value="1">
            <span class="value-display" id="dirLightIntensityValue">1</span>
        </div>

        <div class="control-group">
            <label>Цвет точечного света</label>
            <input type="color" id="pointLightColor" value="#ff9500">
        </div>

        <div class="control-group">
            <label>Цвет куба</label>
            <input type="color" id="cubeColor" value="#ff6b6b">
        </div>

        <div class="control-group">
            <label>Загрузить модель</label>
            <input type="file" id="modelFile" accept=".obj,.gltf,.glb,.fbx">
        </div>

        <div class="control-group">
            <label>Выбрать объект</label>
            <select id="objectSelect">
                <option value="">-- Выберите объект --</option>
            </select>
        </div>

        <div id="transformControls" style="display: none;">
            <h4>Трансформация</h4>

            <div class="control-group">
                <label>Позиция X</label>
                <input type="number" id="posX" step="0.1" value="0">
            </div>
            <div class="control-group">
                <label>Позиция Y</label>
                <input type="number" id="posY" step="0.1" value="0">
            </div>
            <div class="control-group">
                <label>Позиция Z</label>
                <input type="number" id="posZ" step="0.1" value="0">
            </div>

            <div class="control-group">
                <label>Поворот X (градусы)</label>
                <input type="number" id="rotX" step="1" value="0">
            </div>
            <div class="control-group">
                <label>Поворот Y (градусы)</label>
                <input type="number" id="rotY" step="1" value="0">
            </div>
            <div class="control-group">
                <label>Поворот Z (градусы)</label>
                <input type="number" id="rotZ" step="1" value="0">
            </div>

            <div class="control-group">
                <label>Масштаб X</label>
                <input type="number" id="scaleX" step="0.1" value="1" min="0.1">
            </div>
            <div class="control-group">
                <label>Масштаб Y</label>
                <input type="number" id="scaleY" step="0.1" value="1" min="0.1">
            </div>
            <div class="control-group">
                <label>Масштаб Z</label>
                <input type="number" id="scaleZ" step="0.1" value="1" min="0.1">
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
